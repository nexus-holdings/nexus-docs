name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Supply-chain gate — proxy PyPI through escrow with an age gate
      # and OSV CVE scan before anything reaches the runner.
      - name: Supply-chain gate (escrow)
        uses: jverhoeks/escrow@v1
        with:
          ecosystems: pypi
          min-days: '7'
          osv-severity: HIGH

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install \
            mkdocs \
            mkdocs-material \
            pymdown-extensions

      - name: Build site
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build

      # Supply-chain report — write a per-package summary to the
      # job page showing allowed / blocked decisions.
      - name: Supply-chain report
        if: always()
        run: escrow ci-report 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
