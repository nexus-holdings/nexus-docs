<?xml version="1.0" encoding="UTF-8"?>
<!--
  ============================================================
  Platform Layer Shape  structural diagram
  ============================================================

  Built with the structured-diagram skill:
    1. Every arrow enters/leaves a box at 90 deg
    2. All right-angle corners would be rounded (none needed here)
    3. No arrow runs parallel to a perimeter
    4. Generous gaps (70 px between layers)
    5. Lines between boxes equidistant
    6. Outside lines consistent distance
    7. Workflow-accurate

  LAYOUT
    Top    : Memory Layer (single box, centered)
    Middle : Platform Layer (brass) holding 6 entity nodes in
             a 3 x 2 grid: Companies, Tickets, Agents (row 1)
             and Plugins, Routines, Contracts (row 2)
    Bottom : Execution Layer (left) + Governance Layer (right)

  COORDINATE SYSTEM
    viewBox = 0 -10 1000 720
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 -10 1000 720"
     width="100%"
     style="max-width: 1000px; height: auto; background: #0D0F11; display: block; margin: 0 auto;">

  <defs>
    <marker id="arrow"
            viewBox="0 0 10 10"
            refX="9" refY="5"
            markerWidth="8" markerHeight="8"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A8AAB0" />
    </marker>

    <style>
      .brass-box { fill: #14171A; stroke: #D4A574; stroke-width: 2; }
      .arm-box   { fill: #14171A; stroke: #6F7177; stroke-width: 1; }
      .node      { fill: #0D0F11; stroke: #6F7177; stroke-width: 1; }
      .title     { fill: #E6E3DC; font-family: Geist, system-ui, sans-serif; font-size: 14px; font-weight: 600; }
      .text      { fill: #E6E3DC; font-family: Geist, system-ui, sans-serif; font-size: 13px; font-weight: 600; }
      .text-sub  { fill: #A8AAB0; font-family: Geist, system-ui, sans-serif; font-size: 11px; font-style: italic; }
      .edge        { stroke: #A8AAB0; stroke-width: 1.5; fill: none; }
      .edge-label  { fill: #E6E3DC; font-family: Geist, system-ui, sans-serif; font-size: 11px; font-style: italic; }
    </style>
  </defs>


  <!-- ==== MEMORY LAYER  top, centered ==== -->
  <g id="memory">
    <rect class="arm-box" x="350" y="30" width="300" height="100" rx="6" />
    <text class="title"    x="500" y="62"  text-anchor="middle">Memory Layer</text>
    <text class="text-sub" x="500" y="88"  text-anchor="middle">references platform IDs</text>
  </g>


  <!-- ==== PLATFORM LAYER  center, brass-bordered, with 6 entity nodes ==== -->
  <g id="platform">
    <rect class="brass-box" x="60" y="200" width="880" height="290" rx="6" />
    <text class="title" x="90" y="230">Platform Layer</text>

    <!-- Row 1: Companies, Tickets, Agents -->
    <g id="pl-companies">
      <rect class="node" x="90" y="260" width="200" height="80" rx="4" />
      <text class="text" x="190" y="305" text-anchor="middle">Companies</text>
    </g>
    <g id="pl-tickets">
      <rect class="node" x="400" y="260" width="200" height="80" rx="4" />
      <text class="text" x="500" y="305" text-anchor="middle">Tickets</text>
    </g>
    <g id="pl-agents">
      <rect class="node" x="710" y="260" width="200" height="80" rx="4" />
      <text class="text" x="810" y="305" text-anchor="middle">Agents</text>
    </g>

    <!-- Row 2: Plugins, Routines, Contracts -->
    <g id="pl-plugins">
      <rect class="node" x="90" y="370" width="200" height="80" rx="4" />
      <text class="text" x="190" y="415" text-anchor="middle">Plugins</text>
    </g>
    <g id="pl-routines">
      <rect class="node" x="400" y="370" width="200" height="80" rx="4" />
      <text class="text" x="500" y="415" text-anchor="middle">Routines</text>
    </g>
    <g id="pl-contracts">
      <rect class="node" x="710" y="370" width="200" height="80" rx="4" />
      <text class="text" x="810" y="415" text-anchor="middle">Contracts</text>
    </g>
  </g>


  <!-- ==== EXECUTION LAYER  bottom-left ==== -->
  <g id="execution">
    <rect class="arm-box" x="150" y="560" width="320" height="100" rx="6" />
    <text class="title"    x="310" y="592" text-anchor="middle">Execution Layer</text>
    <text class="text-sub" x="310" y="618" text-anchor="middle">asks platform what to run</text>
  </g>


  <!-- ==== GOVERNANCE LAYER  bottom-right ==== -->
  <g id="governance">
    <rect class="arm-box" x="530" y="560" width="320" height="100" rx="6" />
    <text class="title"    x="690" y="592" text-anchor="middle">Governance Layer</text>
    <text class="text-sub" x="690" y="618" text-anchor="middle">writes ADRs about platform changes</text>
  </g>


  <!-- ============================================================ -->
  <!-- ARROWS                                                       -->
  <!-- ============================================================ -->

  <!-- 1. Memory -> Platform  "tags drawers..."  straight vertical -->
  <path class="edge" d="M 500 130 V 200" marker-end="url(#arrow)" />
  <text class="edge-label" x="510" y="170" text-anchor="start">tags drawers with company_id, ticket_id</text>

  <!-- 2. Execution &lt;-&gt; Platform  bidirectional, single line, two labels -->
  <path class="edge" d="M 310 490 V 560"
        marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text class="edge-label" x="300" y="528" text-anchor="end">reads tickets, claims them</text>
  <text class="edge-label" x="320" y="528" text-anchor="start">emits events</text>

  <!-- 3. Platform -> Governance  "emits events"  straight vertical -->
  <path class="edge" d="M 690 490 V 560" marker-end="url(#arrow)" />
  <text class="edge-label" x="700" y="528" text-anchor="start">emits events</text>

</svg>
