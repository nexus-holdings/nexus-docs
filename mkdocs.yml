site_name: Nexus Docs
site_description: Documentation for the Nexus platform
site_url: https://nexus-holdings.github.io/nexus-docs/
copyright: "© 2026"

docs_dir: docs
site_dir: build

# ----------------------------------------------------------------------------
# Theme — Material, dark code-editor aesthetic
# ----------------------------------------------------------------------------
theme:
  name: material
  language: en
  palette:
    # Dark only. Real design tokens come from stylesheets/extra.css
    # which overrides Material's CSS variables. The named palette below is
    # just a base that gets fully restyled — we pick "black" so any
    # un-overridden Material defaults stay neutral rather than fight us.
    - scheme: slate
      primary: black
      accent: amber
  font:
    text: Geist
    code: JetBrains Mono
  features:
    - navigation.instant            # SPA-like nav
    - navigation.tracking           # URL tracks current section
    - navigation.tabs               # Top-level tabs
    - navigation.sections           # Sidebar groups
    - navigation.expand             # Expand sub-sections by default
    - navigation.top                # Back-to-top button
    - navigation.indexes            # Section landing pages
    - navigation.path               # Breadcrumb trail above page title
    - search.suggest                # Search autocomplete
    - search.highlight              # Highlight matches in results
    - content.code.copy             # Copy button on code blocks
  icon:
    repo: fontawesome/brands/git-alt

# ----------------------------------------------------------------------------
# Extensions
# ----------------------------------------------------------------------------
markdown_extensions:
  - admonition                      # !!! note blocks
  - md_in_html                      # markdown inside HTML (used by grid cards)
  - tables
  - toc:
      permalink: true               # ¶ links on headings
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
plugins:
  - search

extra_css:
  - stylesheets/extra.css

